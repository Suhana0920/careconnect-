    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide React Icons - Simplified versions
        const Heart = ({ className, size = 24, fill, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
        );

        const Mail = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
        );

        const Lock = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>

        );

        const Eye = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>

            </svg>
        );

        const EyeOff = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>

        const User = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        );

        const Stethoscope = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M4.6 4.6A2 2 0 1 0 7 7m5-3h.01M7 11h4m4 0h.01"/>
                <circle cx="15" cy="7" r="6"/>
                <path d="M15 13v4a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2v-4"/>
            </svg>
        );

        const Shield = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        );

        const Activity = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
        );

        const MessageCircle = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        );

        const Calendar = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        );

        const Clock = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        );

        const Star = ({ className, size = 24, fill, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" {...props}>
                <polygon points="12 2 15.09 10.26 24 10.27 17.18 16.70 20.27 25 12 19.54 3.73 25 6.82 16.70 0 10.27 8.91 10.26 12 2"/>
            </svg>
        );

        const Users = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        );

        const Award = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <circle cx="12" cy="8" r="7"/>
                <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
            </svg>
        );

        const Zap = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
        );

        const Bell = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        );

        const Video = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
        );

        const FileText = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="13" x2="12" y2="17"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
        );

        const Pill = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <circle cx="7" cy="7" r="5"/>
                <circle cx="17" cy="17" r="5"/>
                <line x1="12" y1="12" x2="12" y2="12.01"/>
            </svg>
        );

        const Clipboard = ({ className, size = 24, ...props }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
        );

        // Main Component
        function CareConnectLogin() {
            const [showPassword, setShowPassword] = useState(false);
            const [userType, setUserType] = useState('patient');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [liveCount, setLiveCount] = useState({ doctors: 15, patients: 50, appointments: 8 });
            const [recentActivities] = useState([
                { name: 'Dr. Sharma', action: 'joined', time: '2 min ago', type: 'doctor' },
                { name: 'Priya M.', action: 'booked appointment', time: '5 min ago', type: 'patient' },
                { name: 'Dr. Patel', action: 'available now', time: '8 min ago', type: 'doctor' }
            ]);
            const [testimonials] = useState([
                { name: 'Raj Kumar', role: 'Patient', rating: 5, text: 'Quick appointments, excellent doctors!', avatar: '👨' },
                { name: 'Dr. Mehta', role: 'Doctor', rating: 5, text: 'Easy to manage my schedule', avatar: '👨‍⚕️' },
                { name: 'Anita Singh', role: 'Patient', rating: 5, text: 'AI chatbot helped me instantly', avatar: '👩' }
            ]);
            const [currentTestimonial, setCurrentTestimonial] = useState(0);
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
            const [passwordStrength, setPasswordStrength] = useState(0);
            const [showSuccessAnimation, setShowSuccessAnimation] = useState(false);
            const [typingEffect, setTypingEffect] = useState('');
            const [specialties] = useState(['Cardiology', 'Pediatrics', 'Orthopedics', 'Dermatology', 'Neurology', 'ENT']);
            const [currentSpecialty, setCurrentSpecialty] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const interval = setInterval(() => {
                    setLiveCount(prev => ({
                        doctors: prev.doctors + Math.floor(Math.random() * 3) - 1,
                        patients: prev.patients + Math.floor(Math.random() * 5) - 2,
                        appointments: prev.appointments + Math.floor(Math.random() * 2)
                    }));
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTestimonial((prev) => (prev + 1) % testimonials.length);
                }, 4000);
                return () => clearInterval(timer);
            }, [testimonials.length]);

            useEffect(() => {
                const text = 'Your Health, Our Priority!';
                let index = 0;
                const timer = setInterval(() => {
                    if (index <= text.length) {
                        setTypingEffect(text.slice(0, index));
                        index++;
                    } else {
                        clearInterval(timer);
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentSpecialty((prev) => (prev + 1) % specialties.length);
                }, 2500);
                return () => clearInterval(timer);
            }, [specialties.length]);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePosition({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            useEffect(() => {
                if (password.length === 0) setPasswordStrength(0);
                else if (password.length < 6) setPasswordStrength(1);
                else if (password.length < 10) setPasswordStrength(2);
                else if (/[A-Z]/.test(password) && /[0-9]/.test(password)) setPasswordStrength(3);
                else if (/[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) setPasswordStrength(4);
            }, [password]);

            const handleLogin = () => {
                setIsLoading(true);
                setTimeout(() => {
                    setIsLoading(false);
                    setShowSuccessAnimation(true);
                    setTimeout(() => setShowSuccessAnimation(false), 2000);
                }, 2000);
            };

            const userTypes = [
                { id: 'patient', label: 'Patient', icon: User, color: 'from-blue-500 to-cyan-500', emoji: '🏥' },
                { id: 'doctor', label: 'Doctor', icon: Stethoscope, color: 'from-green-500 to-emerald-500', emoji: '👨‍⚕️' },
                { id: 'admin', label: 'Admin', icon: Shield, color: 'from-purple-500 to-pink-500', emoji: '👑' }
            ];

            const strengthLabels = ['', 'Weak', 'Fair', 'Good', 'Strong'];

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-4 relative overflow-hidden">
                    <style>{`
                        @keyframes float {
                            0%, 100% { transform: translateY(0px) rotate(0deg); }
                            50% { transform: translateY(-20px) rotate(5deg); }
                        }
                        @keyframes slideUp {
                            from { opacity: 0; transform: translateY(30px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        @keyframes scaleIn {
                            from { transform: scale(0); opacity: 0; }
                            to { transform: scale(1); opacity: 1; }
                        }
                        @keyframes slideInRight {
                            from { transform: translateX(100%); opacity: 0; }
                            to { transform: translateX(0); opacity: 1; }
                        }
                        .animate-slide-up { animation: slideUp 0.6s ease-out; }
                        .animate-scale-in { animation: scaleIn 0.5s ease-out; }
                        .animate-slide-in-right { animation: slideInRight 0.8s ease-out; }
                    `}</style>
                    
                    {/* Floating Icons */}
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        {[Heart, Stethoscope, Pill, Clipboard, Activity].map((Icon, idx) => (
                            <Icon
                                key={idx}
                                className="absolute text-blue-200 opacity-20"
                                size={40}
                                style={{
                                    left: `${20 + idx * 20}%`,
                                    top: `${10 + idx * 15}%`,
                                    animation: `float ${5 + idx}s ease-in-out infinite`,
                                    animationDelay: `${idx * 0.5}s`
                                }}
                            />
                        ))}
                    </div>

                    {/* Animated Gradient Background */}
                    <div className="absolute inset-0 opacity-30">
                        <div className="absolute top-0 left-0 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse"></div>
                        <div className="absolute top-0 right-0 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse" style={{ animationDelay: '2s' }}></div>
                        <div className="absolute bottom-0 left-1/2 w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse" style={{ animationDelay: '4s' }}></div>
                    </div>

                    {/* Success Animation */}
                    {showSuccessAnimation && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
                            <div className="bg-white rounded-3xl p-8 text-center animate-scale-in">
                                <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                                    <Heart className="w-10 h-10 text-white" fill="white" />
                                </div>
                                <h3 className="text-2xl font-bold text-gray-800 mb-2">Welcome to CareConnect+!</h3>
                                <p className="text-gray-600">Login successful ✓</p>
                            </div>
                        </div>
                    )}

                    {/* Main Container */}
                    <div className="w-full max-w-7xl bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden flex flex-col lg:flex-row relative z-10">
                        
                        {/* Left Side */}
                        <div className="lg:w-2/5 bg-gradient-to-br from-blue-600 via-purple-600 to-pink-600 p-8 lg:p-10 text-white relative overflow-hidden">
                            
                            <div 
                                className="absolute inset-0 opacity-10"
                                style={{
                                    backgroundImage: 'radial-gradient(circle, white 1px, transparent 1px)',
                                    backgroundSize: '30px 30px',
                                    transform: `translate(${mousePosition.x * 0.02}px, ${mousePosition.y * 0.02}px)`
                                }}
                            ></div>

                            <div className="relative z-10">
                                {/* Logo */}
                                <div className="flex items-center gap-3 mb-6 animate-slide-up">
                                    <div className="bg-white p-3 rounded-2xl animate-bounce" style={{ animationDuration: '2s' }}>
                                        <Heart className="w-10 h-10 text-pink-600" fill="currentColor" />
                                    </div>
                                    <div>
                                        <h1 className="text-4xl font-bold">CareConnect<span className="text-yellow-300">+</span></h1>
                                        <p className="text-blue-200 text-sm h-5">{typingEffect}</p>
                                    </div>
                                </div>

                                {/* Clock */}
                                <div className="mb-6 p-4 bg-white/10 rounded-xl backdrop-blur-sm animate-slide-up" style={{ animationDelay: '0.2s' }}>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <Clock className="w-5 h-5" />
                                            <span className="font-semibold">{currentTime.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</span>
                                        </div>
                                        <div className="text-sm">{currentTime.toLocaleDateString('en-IN', { weekday: 'long', month: 'short', day: 'numeric' })}</div>
                                    </div>
                                </div>

                                {/* Live Stats */}
                                <div className="mb-6 p-4 bg-white/10 rounded-xl backdrop-blur-sm animate-slide-up" style={{ animationDelay: '0.3s' }}>
                                    <div className="text-xs text-blue-200 mb-3 flex items-center gap-2">
                                        <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                                        LIVE NOW
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-green-400 animate-pulse">{liveCount.doctors}</div>
                                            <div className="text-xs text-blue-200">Doctors Online</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-yellow-400 animate-pulse">{liveCount.patients}</div>
                                            <div className="text-xs text-blue-200">Active Patients</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-pink-400 animate-pulse">{liveCount.appointments}</div>
                                            <div className="text-xs text-blue-200">Today's Appts</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Recent Activity */}
                                <div className="mb-6 p-4 bg-white/10 rounded-xl backdrop-blur-sm animate-slide-up" style={{ animationDelay: '0.4s' }}>
                                    <div className="flex items-center gap-2 mb-3">
                                        <Activity className="w-4 h-4" />
                                        <span className="text-sm font-semibold">Recent Activity</span>
                                    </div>
                                    <div className="space-y-2">
                                        {recentActivities.map((activity, idx) => (
                                            <div key={idx} className="flex items-center gap-3 text-sm bg-white/5 p-2 rounded-lg animate-slide-in-right" style={{ animationDelay: `${idx * 0.2}s` }}>
                                                <div className="text-2xl">{activity.type === 'doctor' ? '👨‍⚕️' : '👤'}</div>
                                                <div className="flex-1">
                                                    <div className="font-medium">{activity.name}</div>
                                                    <div className="text-xs text-blue-200">{activity.action}</div>
                                                </div>
                                                <div className="text-xs text-blue-300">{activity.time}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Testimonials */}
                                <div className="p-4 bg-white/10 rounded-xl backdrop-blur-sm animate-slide-up" style={{ animationDelay: '0.6s' }}>
                                    <div className="flex items-center gap-2 mb-3">
                                        <MessageCircle className="w-4 h-4" />
                                        <span className="text-sm font-semibold">Patient Reviews</span>
                                    </div>
                                    <div className="relative h-24">
                                        {testimonials.map((testimonial, idx) => (
                                            <div
                                                key={idx}
                                                className={`absolute inset-0 transition-all duration-500 ${
                                                    idx === currentTestimonial ? 'opacity-100 scale-100' : 'opacity-0 scale-95'
                                                }`}
                                            >
                                                <div className="flex items-start gap-3">
                                                    <div className="text-4xl">{testimonial.avatar}</div>
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-1 mb-1">
                                                            {[...Array(testimonial.rating)].map((_, i) => (
                                                                <Star key={i} className="w-3 h-3 text-yellow-400" fill="currentColor" />
                                                            ))}
                                                        </div>
                                                        <p className="text-sm italic mb-1">"{testimonial.text}"</p>
                                                        <div className="text-xs text-blue-200">- {testimonial.name}, {testimonial.role}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-center gap-2 mt-3">
                                        {testimonials.map((_, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => setCurrentTestimonial(idx)}
                                                className={`w-2 h-2 rounded-full transition-all ${
                                                    idx === currentTestimonial ? 'bg-white w-6' : 'bg-white/30'
                                                }`}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Side - Login Form */}
                        <div className="lg:w-3/5 p-8 lg:p-12 relative">
                            
                            <div className="absolute top-4 right-4 flex gap-2">
                                <div className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1 animate-bounce">
                                    <Users className="w-3 h-3" />
                                    500+ Doctors
                                </div>
                                <div className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1 animate-bounce" style={{ animationDelay: '0.2s' }}>
                                    <Heart className="w-3 h-3" />
                                    50K+ Patients
                                </div>
                            </div>

                            <div className="max-w-md mx-auto mt-8">
                                <div className="animate-slide-up">
                                    <h2 className="text-4xl font-bold text-gray-800 mb-2">Welcome Back! 👋</h2>
                                    <p className="text-gray-600 mb-8">Sign in to manage your healthcare journey</p>
                                </div>

                                {/* Role Selection */}
                                <div className="mb-6 animate-slide-up" style={{ animationDelay: '0.1s' }}>
                                    <label className="text-sm font-medium text-gray-700 mb-3 block">Select Your Role:</label>
                                    <div className="grid grid-cols-3 gap-3">
                                        {userTypes.map((type, idx) => {
                                            const Icon = type.icon;
                                            return (
                                                <button
                                                    key={type.id}
                                                    type="button"
                                                    onClick={() => setUserType(type.id)}
                                                    className={`relative p-4 rounded-2xl border-3 transition-all duration-500 transform hover:scale-105 ${
                                                        userType === type.id
                                                            ? `bg-gradient-to-br ${type.color} text-white border-transparent shadow-2xl scale-105`
                                                            : 'bg-white border-gray-200 text-gray-600 hover:border-blue-300 hover:shadow-lg'
                                                    }`}
                                                    style={{ animationDelay: `${idx * 0.1}s` }}
                                                >
                                                    {userType === type.id && (
                                                        <div className="absolute -top-2 -right-2 bg-yellow-400 rounded-full p-1 animate-bounce">
                                                            <Award className="w-4 h-4 text-white" />
                                                        </div>
                                                    )}
                                                    <div className="text-3xl mb-2">{type.emoji}</div>
                                                    <Icon className="w-6 h-6 mx-auto mb-2" />
                                                    <div className="text-xs font-bold">{type.label}</div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="space-y-5">
                                    {/* Email Input */}
                                    <div className="animate-slide-up" style={{ animationDelay: '0.2s' }}>
                                        <label className="text-sm font-medium text-gray-700 mb-2 block">Email Address</label>
                                        <div className="relative group">
                                            <Mail className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5 group-focus-within:text-blue-600 transition-colors" />
                                            <input
                                                type="email"
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                                placeholder="your.email@example.com"
                                                className="w-full pl-12 pr-4 py-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-all focus:shadow-lg"
                                            />
                                        </div>
                                    </div>

                                    {/* Password Input */}
                                    <div className="animate-slide-up" style={{ animationDelay: '0.3s' }}>
                                        <label className="text-sm font-medium text-gray-700 mb-2 block">Password</label>
                                        <div className="relative group">
                                            <Lock className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5 group-focus-within:text-blue-600 transition-colors" />
                                            <input
                                                type={showPassword ? 'text' : 'password'}
                                                value={password}
                                                onChange={(e) => setPassword(e.target.value)}
                                                placeholder="Enter your password"
                                                className="w-full pl-12 pr-12 py-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-all focus:shadow-lg"
                                            />
                                            <button
                                                type="button"
                                                onClick={() => setShowPassword(!showPassword)}
                                                className="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                                            >
                                                {showPassword ? <EyeOff className="w-5 h-5" /> : <Eye className="w-5 h-5" />}
                                            </button>
                                        </div>
                                        
                                        {password && (
                                            <div className="mt-3">
                                                <div className="flex gap-1">
                                                    {[1, 2, 3, 4].map((level) => (
                                                        <div
                                                            key={level}
                                                            className="h-2 flex-1 rounded-full transition-all duration-500"
                                                            style={{
                                                                backgroundColor: level <= passwordStrength ? `hsl(${(passwordStrength - 1) * 40}, 100%, 50%)` : '#e5e7eb',
                                                                transform: level <= passwordStrength ? 'scaleY(1.5)' : 'scaleY(1)',
                                                                transformOrigin: 'bottom'
                                                            }}
                                                        ></div>
                                                    ))}
                                                </div>
                                                <div className="flex items-center justify-between mt-1">
                                                    <p className="text-xs font-medium" style={{ color: `hsl(${(passwordStrength - 1) * 40}, 100%, 50%)` }}>
                                                        {strengthLabels[passwordStrength]}
                                                    </p>
                                                    {passwordStrength >= 3 && (
                                                        <Zap className="w-4 h-4 text-yellow-500 animate-bounce" />
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Remember & Forgot */}
                                    <div className="flex items-center justify-between animate-slide-up" style={{ animationDelay: '0.4s' }}>
                                        <label className="flex items-center gap-3 cursor-pointer group">
                                            <div className="relative">
                                                <input type="checkbox" className="sr-only peer" />
                                                <div className="w-11 h-6 bg-gray-200 rounded-full peer-checked:bg-blue-600 transition-colors"></div>
                                                <div className="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                                            </div>
                                            <span className="text-sm text-gray-600 group-hover:text-gray-800">Remember me</span>
                                        </label>
                                        <a href="#" className="text-sm text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1 group">
                                            Forgot Password?
                                            <Zap className="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity" />
                                        </a>
                                    </div>

                                    {/* Login Button */}
                                    <button
                                        type="button"
                                        onClick={handleLogin}
                                        disabled={isLoading}
                                        className={`relative w-full bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden group animate-slide-up ${
                                            isLoading ? 'opacity-70 cursor-not-allowed' : 'hover:scale-105'
                                        }`}
                                        style={{ animationDelay: '0.5s' }}
                                    >
                                        <span className="relative z-10 flex items-center justify-center gap-2">
                                            {isLoading ? (
                                                <>
                                                    <div className="w-6 h-6 border-3 border-white border-t-transparent rounded-full animate-spin"></div>
                                                    Signing in...
                                                </>
                                            ) : (
                                                <>
                                                    Sign In Now
                                                    <Zap className="w-5 h-5 group-hover:animate-bounce" />
                                                </>
                                            )}
                                        </span>
                                        <div className="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity"></div>
                                    </button>

                                    {/* Quick Access Icons */}
                                    <div className="grid grid-cols-4 gap-3 pt-4 animate-slide-up" style={{ animationDelay: '0.6s' }}>
                                        <button className="flex flex-col items-center gap-1 p-3 rounded-xl hover:bg-gray-100 transition-colors group">
                                            <Video className="w-5 h-5 text-blue-600 group-hover:scale-110 transition-transform" />
                                            <span className="text-xs text-gray-600">Video Call</span>
                                        </button>
                                        <button className="flex flex-col items-center gap-1 p-3 rounded-xl hover:bg-gray-100 transition-colors group">
                                            <Calendar className="w-5 h-5 text-green-600 group-hover:scale-110 transition-transform" />
                                            <span className="text-xs text-gray-600">Book Now</span>
                                        </button>
                                        <button className="flex flex-col items-center gap-1 p-3 rounded-xl hover:bg-gray-100 transition-colors group">
                                            <FileText className="w-5 h-5 text-purple-600 group-hover:scale-110 transition-transform" />
                                            <span className="text-xs text-gray-600">Records</span>
                                        </button>
                                        <button className="flex flex-col items-center gap-1 p-3 rounded-xl hover:bg-gray-100 transition-colors group">
                                            <Bell className="w-5 h-5 text-orange-600 group-hover:scale-110 transition-transform" />
                                            <span className="text-xs text-gray-600">Alerts</span>
                                        </button>
                                    </div>

                                    {/* Sign Up */}
                                    <p className="text-center text-gray-600 text-sm animate-slide-up" style={{ animationDelay: '0.7s' }}>
                                        Don't have an account?{' '}
                                        <a href="#" className="text-blue-600 hover:text-blue-700 font-bold underline">
                                            Sign up now - It's FREE! 🎉
                                        </a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Help Button */}
                    <button className="fixed bottom-6 right-6 bg-gradient-to-r from-pink-500 to-purple-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform z-50 animate-bounce">
                        <MessageCircle className="w-6 h-6" />
                    </button>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<CareConnectLogin />);
    </script>
</body>
</html>
